name: flutter_payvessel
description: A Flutter SDK for Payvessel Payment Gateway. Supports Bank Transfer and Card payments with simple API similar to npm payvessel-checkout package.
version: 1.0.0
homepage: https://payvessel.com
repository: https://github.com/Nex-Panther-Technologies-Ltd/flutter-payvessel
issue_tracker: https://github.com/Nex-Panther-Technologies-Ltd/flutter-payvessel/issues

topics:
  - payments
  - checkout
  - payment-gateway
  - fintech

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
